<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeiterfassung</title>
<style>
body{font-family:Arial;background:#eef1f5;margin:0}
header{background:#174d82;color:white;padding:25px;font-size:28px;font-weight:bold}
.card{background:white;margin:30px;padding:25px;border-radius:15px}
input,button{width:100%;padding:15px;margin-top:15px;font-size:18px}
button{background:#174d82;color:white;border:0;border-radius:10px}
</style>
</head>
<body>

<header>🏗️ Zeiterfassung</header>

<div id="login" class="card">
<h1>Anmeldung</h1>
<input id="user" value="Volker">
<input id="pass" type="password" value="09101994">
<button onclick="anmelden()">Anmelden</button>
</div>

<div id="app" class="card" style="display:none">
<h1>Willkommen Volker</h1>
<p>KW 23 / 2026</p>
<p>Wochenstunden: 39,5 h</p>
<input placeholder="Baustelle">
<input placeholder="Tätigkeit">
<button onclick="alert('Wochenbericht gespeichert')">Wochenbericht absenden</button>
</div>

<script>
function anmelden(){
  var user = document.getElementById("user").value;
  var pass = document.getElementById("pass").value;

  if(user === "Volker" && pass === "09101994"){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    alert("Falsche Zugangsdaten");
  }
}
</script>

</body>
</html>
