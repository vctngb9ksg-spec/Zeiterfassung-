<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeiterfassung Handwerksbetrieb</title>
<style>
body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f4f7;
margin:0;
padding:0;
}
header{
background:#0f4c81;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}
.container{
padding:15px;
}
.card{
background:white;
border-radius:12px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
input, textarea, select, button{
width:100%;
padding:10px;
margin-top:8px;
box-sizing:border-box;
}
button{
background:#0f4c81;
color:white;
border:none;
border-radius:8px;
}
.hidden{
display:none;
}
.day{
border-top:1px solid #ddd;
padding-top:10px;
margin-top:10px;
}
</style>
<script>
function login(){
let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;
if(user==="Volker" && pass==="09101994"){
document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
}
else{
alert("Benutzername oder Passwort falsch");
}
}
</script>
</head>
<body>
<header>
🏗️ Zeiterfassung
</header>
<div class="container">
<div id="login">
<div class="card">
<h2>Anmeldung</h2>
<input id="user" value="Volker">
<input id="pass" type="password" value="09101994">

Anmelden

</div>
</div>
<div id="app" class="hidden">
<div class="card">
<h2>Willkommen Volker</h2>

KW 23 / 2026

Wochenstunden: 39,5 h

<br>

Überstundenkonto: +12 h

</div>
<div class="card">
<h3>Wochenbericht</h3>
<div class="day">
<b>Montag</b>
<input placeholder="Baustelle">
<textarea placeholder="Tätigkeit"></textarea>
</div>
<div class="day">
<b>Dienstag</b>
<input placeholder="Baustelle">
</div>
<div class="day">
<b>Mittwoch</b>
<input placeholder="Baustelle">
</div>
<div class="day">
<b>Donnerstag</b>
<input placeholder="Baustelle">
</div>
<div class="day">
<b>Freitag</b>
<input placeholder="Baustelle">
</div>

Wochenbericht absenden

</div>
</div>
</div>
</body>
</html>
