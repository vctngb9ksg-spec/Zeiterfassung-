<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Zeiterfassung - Temborius & Fretter</title>
<style>
:root {
  --green:#009e4d; --green-dark:#08783e; --orange:#ff7f18; --orange-dark:#d96200;
  --bg:#f4f6f3; --card:#ffffff; --text:#1f2a24; --muted:#66746b; --line:#dfe7e1;
  --danger:#c62828; --shadow:0 12px 30px rgba(0,0,0,.10); --radius:18px;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);padding-bottom:92px}
.app{max-width:760px;margin:0 auto;min-height:100vh}
.header{background:#fff;border-bottom:5px solid var(--green);box-shadow:0 4px 18px rgba(0,0,0,.08);position:sticky;top:0;z-index:10}
.logoBox{padding:14px 18px 8px;text-align:center}
.logoBox img{width:min(430px,88vw);height:auto;display:block;margin:0 auto}
.titleBar{background:linear-gradient(90deg,var(--green),var(--orange));color:white;padding:10px 18px;font-weight:800;text-align:center;letter-spacing:.2px}
main{padding:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
h2{font-size:21px;margin:0 0 14px;color:var(--green-dark)}
h3{font-size:17px;margin:16px 0 10px;color:var(--orange-dark)}
label{display:block;font-weight:700;margin:12px 0 6px}
input,select,textarea{width:100%;font-size:16px;border:1.5px solid var(--line);border-radius:12px;padding:12px;background:white;color:var(--text)}
textarea{min-height:88px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{border:0;border-radius:14px;padding:13px 15px;font-size:16px;font-weight:800;cursor:pointer;width:100%;box-shadow:0 6px 12px rgba(0,0,0,.10)}
.btnGreen{background:var(--green);color:#fff} .btnOrange{background:var(--orange);color:#fff} .btnLight{background:#eef8f2;color:var(--green-dark);border:1px solid #cfe8d8} .btnDanger{background:var(--danger);color:white}
.btn:active{transform:scale(.99)}
.tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);z-index:20;box-shadow:0 -4px 18px rgba(0,0,0,.08)}
.tab{padding:10px 4px 14px;text-align:center;font-size:12px;font-weight:800;color:var(--muted);border:0;background:white}
.tab.active{color:var(--green-dark);background:#f0fbf4;border-top:4px solid var(--orange)}
.hidden{display:none!important}
.entry{border:1px solid var(--line);border-left:6px solid var(--green);border-radius:16px;padding:12px;margin:10px 0;background:#fff}
.entry .meta{font-size:13px;color:var(--muted);line-height:1.45}
.badge{display:inline-block;padding:5px 8px;border-radius:999px;background:#fff4e8;color:var(--orange-dark);font-weight:800;font-size:12px;margin:3px 3px 0 0}
.total{background:#eef8f2;border:1px solid #cfe8d8;border-radius:14px;padding:12px;margin-top:12px;font-weight:900;color:var(--green-dark)}
.warn{background:#fff4e8;border:1px solid #ffd2a8;color:#7a3b00;border-radius:14px;padding:11px;margin:10px 0}
.small{font-size:13px;color:var(--muted)}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.dayGroup{border-top:3px solid var(--orange);padding-top:12px;margin-top:14px}
@media(max-width:520px){.row{grid-template-columns:1fr} main{padding:12px} .card{padding:14px;border-radius:16px}}
@media print{.tabs,.noPrint,.btn{display:none!important} body{background:#fff;padding:0} .app{max-width:none} .card{box-shadow:none;border:1px solid #ddd} .header{position:static;box-shadow:none}}
</style>
</head>

    <div class="titleBar">Zeiterfassung</div>
  </header>
  <main>
    <section id="pageErfassung" class="page">
      <div class="card">
        <h2>Tagesbericht erfassen</h2>
        <div class="row">
          <div><label>Mitarbeiter</label><select id="employee"></select></div>
          <div><label>Datum</label><input id="date" type="date"></div>
        </div>
        <div id="holidayHint" class="warn hidden"></div>
        <div id="sites"></div>
        <button class="btn btnOrange noPrint" onclick="addSite()">+ Weitere Baustelle hinzufügen</button>
        <div class="total" id="dayTotal">Tagesarbeitszeit: 0:00 Std.</div>
        <button class="btn btnGreen noPrint" style="margin-top:12px" onclick="saveReport()">Bericht speichern</button>
      </div>
    </section>

    <section id="pageWoche" class="page hidden">
      <div class="card"><h2>Wochenbericht</h2><label>Mitarbeiter</label><select id="weekEmployee"></select><label>Kalenderwoche</label><input id="weekPicker" type="week"><button class="btn btnGreen noPrint" style="margin-top:12px" onclick="renderWeek()">Wochenbericht anzeigen</button><div id="weekOutput"></div></div>
    </section>

    <section id="pageArchiv" class="page hidden">
      <div class="card"><h2>Archiv</h2><label>Archivwoche auswählen</label><select id="archiveWeeks"></select><button class="btn btnOrange noPrint" style="margin-top:12px" onclick="renderArchive()">Archivwoche öffnen</button><div id="archiveOutput"></div></div>
    </section>

    <section id="pageChef" class="page hidden">
      <div class="card"><h2>Chef / Büro</h2><p class="small">Baustelle suchen, alle Arbeitstage anzeigen und gespeicherte Berichte korrigieren.</p><label>Baustelle suchen</label><input id="siteSearch" placeholder="z. B. Musterstraße, Kunde, Projekt"><button class="btn btnGreen noPrint" style="margin-top:12px" onclick="renderSiteSearch()">Suchen</button><div id="siteSearchOutput"></div></div>
    </section>
  </main>
</div>
<nav class="tabs noPrint">
  <button class="tab active" onclick="showPage('Erfassung',this)">Erfassen</button>
  <button class="tab" onclick="showPage('Woche',this)">Woche</button>
  <button class="tab" onclick="showPage('Archiv',this)">Archiv</button>
  <button class="tab" onclick="showPage('Chef',this)">Chef/Büro</button>
</nav>
<script>
const employees=['Mitarbeiter 1','Mitarbeiter 2','Mitarbeiter 3','Mitarbeiter 4','Mitarbeiter 5'];
const NRW_HOLIDAYS = {'01-01':'Neujahr','05-01':'Tag der Arbeit','10-03':'Tag der Deutschen Einheit','11-01':'Allerheiligen','12-25':'1. Weihnachtstag','12-26':'2. Weihnachtstag'};
let editingId=null;
function fillSelects(){['employee','weekEmployee'].forEach(id=>{const s=document.getElementById(id);s.innerHTML=employees.map(e=>`<option>${e}</option>`).join('')})}
function todayISO(){return new Date().toISOString().slice(0,10)}
function pad(n){return String(n).padStart(2,'0')}
function minutes(t){if(!t)return 0; const [h,m]=t.split(':').map(Number); return h*60+m}
function hm(min){min=Math.max(0,Math.round(min)); return `${Math.floor(min/60)}:${pad(min%60)}`}
function uuid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function getReports(){return JSON.parse(localStorage.getItem('tf_reports')||'[]')}
function setReports(r){localStorage.setItem('tf_reports',JSON.stringify(r)); refreshArchiveWeeks()}
function easter(y){let a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,day)}
function addDays(date,days){let d=new Date(date);d.setDate(d.getDate()+days);return d}
function holidayName(iso){let d=new Date(iso+'T00:00:00'),y=d.getFullYear(),key=pad(d.getMonth()+1)+'-'+pad(d.getDate()); if(NRW_HOLIDAYS[key]) return NRW_HOLIDAYS[key]; let e=easter(y); let mov={[-2]:'Karfreitag',[1]:'Ostermontag',[39]:'Christi Himmelfahrt',[50]:'Pfingstmontag',[60]:'Fronleichnam'}; for(const off in mov){let x=addDays(e,Number(off)); if(x.toISOString().slice(0,10)===iso) return mov[off];} return ''}
function addSite(data={}){const wrap=document.createElement('div'); wrap.className='entry siteBlock'; wrap.innerHTML=`
<label>Baustelle</label><input class="site" placeholder="Baustelle / Kunde / Adresse" value="${data.site||''}">
<div class="row"><div><label>Arbeitsbeginn</label><input class="start" type="time" value="${data.start||'07:00'}"></div><div><label>Arbeitsende</label><input class="end" type="time" value="${data.end||'16:15'}"></div></div>
<div class="row"><div><label>Pause in Minuten</label><input class="break" type="number" min="0" step="5" value="${data.breakMin??45}"></div><div><label>H</label><select class="hmark"><option value="Nein">Nein</option><option value="Ja">Ja</option></select></div></div>
<label>Ausgeführte Tätigkeiten</label><textarea class="task" placeholder="Tätigkeiten eintragen">${data.task||''}</textarea>
<div class="total blockTotal">Arbeitszeit Baustelle: 0:00 Std.</div><button class="btn btnLight noPrint" style="margin-top:8px" onclick="this.closest('.siteBlock').remove();calcTotal()">Baustelle entfernen</button>`;
 document.getElementById('sites').appendChild(wrap); wrap.querySelector('.hmark').value=data.hmark||'Nein'; wrap.querySelectorAll('input,select,textarea').forEach(el=>el.addEventListener('input',calcTotal)); calcTotal();}
function calcTotal(){let total=0;document.querySelectorAll('.siteBlock').forEach(b=>{let m=minutes(b.querySelector('.end').value)-minutes(b.querySelector('.start').value)-Number(b.querySelector('.break').value||0); if(m<0)m=0; total+=m; b.querySelector('.blockTotal').textContent='Arbeitszeit Baustelle: '+hm(m)+' Std.'}); document.getElementById('dayTotal').textContent='Tagesarbeitszeit: '+hm(total)+' Std.'; checkHoliday();}
function collectSites(){return [...document.querySelectorAll('.siteBlock')].map(b=>({site:b.querySelector('.site').value.trim(),start:b.querySelector('.start').value,end:b.querySelector('.end').value,breakMin:Number(b.querySelector('.break').value||0),hmark:b.querySelector('.hmark').value,task:b.querySelector('.task').value.trim(),minutes:Math.max(0,minutes(b.querySelector('.end').value)-minutes(b.querySelector('.start').value)-Number(b.querySelector('.break').value||0))})).filter(x=>x.site)}
function saveReport(){const sites=collectSites(); if(!sites.length){alert('Bitte mindestens eine Baustelle eintragen.');return} let r=getReports(); const report={id:editingId||uuid(),employee:employee.value,date:date.value,kw:getWeekKey(date.value),sites,total:sites.reduce((a,b)=>a+b.minutes,0),changedAt:new Date().toLocaleString('de-DE')}; r=r.filter(x=>x.id!==report.id); r.push(report); setReports(r); editingId=null; document.querySelector('.titleBar').textContent='Zeiterfassung'; document.getElementById('sites').innerHTML=''; addSite(); alert('Bericht gespeichert.')}
function showPage(name,btn){document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));document.getElementById('page'+name).classList.remove('hidden');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active'); if(name==='Archiv')refreshArchiveWeeks();}
function getWeekKey(iso){let d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+4-(d.getDay()||7)); let y=d.getFullYear(); let start=new Date(y,0,1); let w=Math.ceil((((d-start)/86400000)+1)/7); return y+'-W'+pad(w)}
function renderEntries(list, editable=false){if(!list.length)return '<p class="small">Keine Einträge gefunden.</p>'; return list.sort((a,b)=>a.date.localeCompare(b.date)).map(r=>`<div class="dayGroup"><h3>${new Date(r.date+'T00:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'})} · ${r.employee}</h3>${r.sites.map(s=>`<div class="entry"><b>${s.site}</b><div class="meta">${s.start} - ${s.end} Uhr · Pause ${s.breakMin} Min. · Arbeitszeit ${hm(s.minutes)} Std. · H: ${s.hmark}</div><p>${s.task||'-'}</p></div>`).join('')}<div class="total">Tag gesamt: ${hm(r.total)} Std.</div>${editable?`<div class="actions noPrint"><button class="btn btnOrange" onclick="editReport('${r.id}')">Korrigieren</button><button class="btn btnDanger" onclick="deleteReport('${r.id}')">Löschen</button></div>`:''}</div>`).join('')}
function renderWeek(){const list=getReports().filter(r=>r.employee===weekEmployee.value && r.kw===weekPicker.value); weekOutput.innerHTML=renderEntries(list,false)+'<button class="btn btnLight noPrint" onclick="window.print()">Drucken / PDF speichern</button>';}
function refreshArchiveWeeks(){const weeks=[...new Set(getReports().map(r=>r.kw))].sort().reverse(); archiveWeeks.innerHTML=weeks.map(w=>`<option>${w}</option>`).join('')||'<option>Keine Wochen vorhanden</option>';}
function renderArchive(){archiveOutput.innerHTML=renderEntries(getReports().filter(r=>r.kw===archiveWeeks.value),true);}
function renderSiteSearch(){let q=siteSearch.value.toLowerCase().trim(); let list=getReports().filter(r=>r.sites.some(s=>s.site.toLowerCase().includes(q))); siteSearchOutput.innerHTML=renderEntries(list,true);}
function editReport(id){const r=getReports().find(x=>x.id===id); if(!r)return; editingId=id; employee.value=r.employee; date.value=r.date; sites.innerHTML=''; r.sites.forEach(addSite); document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden')); pageErfassung.classList.remove('hidden'); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelector('.tab').classList.add('active'); document.querySelector('.titleBar').textContent='Bericht korrigieren'; window.scrollTo(0,0);}
function deleteReport(id){if(confirm('Diesen Bericht wirklich löschen?')){setReports(getReports().filter(r=>r.id!==id)); renderArchive(); renderSiteSearch();}}
function checkHoliday(){const n=holidayName(date.value); holidayHint.classList.toggle('hidden',!n); holidayHint.textContent=n?'Feiertag in NRW: '+n:''}
function setCurrentWeek(){let w=getWeekKey(todayISO()); weekPicker.value=w;}
fillSelects(); date.value=todayISO(); setCurrentWeek(); addSite(); refreshArchiveWeeks(); date.addEventListener('input',checkHoliday); checkHoliday();
</script>
</body>
</html>
